<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>한눈에 보는 AIEP 설정 가이드</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
    <style>
        :root {
            --primary-color: #6366F1; /* 트렌디한 인디고 */
            --primary-hover: #4F46E5;
            --text-main: #1E293B;
            --text-muted: #64748B;
            /* 테두리와 카드 배경을 더 또렷하게 변경 */
            --border-color: #CBD5E1; 
            --card-bg: rgba(255, 255, 255, 0.95); 
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', sans-serif;
            color: var(--text-main);
            line-height: 1.6;
            background-color: #F8FAFC;
            background-image: radial-gradient(#CBD5E1 1px, transparent 1px);
            background-size: 24px 24px;
            position: relative;
            overflow-x: hidden;
        }

        .bg-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            z-index: -1;
            opacity: 0.6;
            animation: float 10s infinite alternate ease-in-out;
        }
        .blob-1 {
            top: -100px; left: -100px;
            width: 500px; height: 500px;
            background: #E0E7FF;
        }
        .blob-2 {
            top: 40%; right: -150px;
            width: 600px; height: 600px;
            background: #DBEAFE;
            animation-delay: -5s;
        }
        .blob-3 {
            bottom: -200px; left: 20%;
            width: 700px; height: 700px;
            background: #F3E8FF;
        }

        @keyframes float {
            0% { transform: translateY(0px) scale(1); }
            100% { transform: translateY(30px) scale(1.05); }
        }

        header {
            padding: 50px 20px 30px 20px;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        .header-badge {
            display: inline-block;
            padding: 6px 14px;
            background: rgba(99, 102, 241, 0.1);
            color: var(--primary-color);
            border-radius: 30px;
            font-weight: 700;
            font-size: 14px;
            margin-bottom: 15px;
            border: 1px solid rgba(99, 102, 241, 0.2);
        }

        header h1 {
            margin: 0;
            font-size: 34px;
            color: var(--text-main);
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        header p {
            margin: 15px 0 0 0;
            color: var(--text-muted);
            font-size: 17px;
        }

        .timeline {
            position: relative;
            max-width: 900px;
            margin: 30px auto 100px auto;
            padding: 0 20px;
            z-index: 10;
        }

        .timeline-item {
            position: relative;
            margin-bottom: 30px;
        }

        .timeline-marker {
            position: absolute;
            left: 0;
            top: 20px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #FFFFFF;
            border: 2px solid #CBD5E1; /* 마커 테두리도 조금 더 진하게 */
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 18px;
            color: #64748B;
            transition: all 0.3s ease;
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            top: 64px;
            bottom: -30px;
            left: 21px;
            width: 2px;
            background: linear-gradient(to bottom, #CBD5E1, #E2E8F0);
            z-index: 1;
        }

        .timeline-item:last-child::before {
            display: none;
        }

        .timeline-header {
            margin-left: 70px;
            padding: 24px 30px;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 16px;
            border: 1px solid var(--border-color);
            /* 기본 그림자를 진하게 주어 배경과 분리 */
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05); 
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .title-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .step-icon {
            font-size: 24px;
            background: #F1F5F9;
            width: 40px; height: 40px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        .timeline-header h2 {
            margin: 0;
            font-size: 19px;
            font-weight: 700;
            color: var(--text-main);
        }

        .toggle-icon {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: #F1F5F9;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: #64748B;
            transition: all 0.3s ease;
        }

        .timeline-header:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.08);
            background: #FFFFFF;
            border-color: #94A3B8;
        }

        .timeline-content {
            margin-left: 70px;
            background: #FFFFFF;
            border-radius: 0 0 16px 16px;
            padding: 0 30px;
            max-height: 0;
            overflow: hidden;
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateY(-10px);
            border: 1px solid transparent;
            border-top: none;
        }

        .desc-text {
            font-size: 16px;
            color: var(--text-main);
            background: #F8FAFC;
            padding: 24px;
            border-radius: 12px;
            margin-bottom: 24px;
            border-left: 4px solid var(--primary-color);
            box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.02);
        }

        .pdf-frame {
            width: 100%;
            height: 75vh;
            min-height: 600px;
            border: 1px solid #E2E8F0;
            border-radius: 12px;
            background-color: #F8FAFC;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }

        /* ★★★ 활성화(클릭됨) 상태 디자인 강화 ★★★ */
        .timeline-item.active .timeline-marker {
            border-color: var(--primary-color);
            background: var(--primary-color);
            color: white;
            box-shadow: 0 0 0 6px rgba(99, 102, 241, 0.15);
        }

        .timeline-item.active .timeline-header {
            border-bottom-left-radius: 0;
            border-bottom-right-radius: 0;
            background: #FFFFFF;
            /* 활성화 시 테두리를 테마색으로 명확히 지정 */
            border-color: var(--primary-color); 
            border-bottom-color: transparent;
            /* 테마색을 섞은 뚜렷한 그림자 */
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.12);
        }

        .timeline-item.active .step-icon {
            background: #EEF2FF;
        }

        .timeline-item.active .toggle-icon {
            background: var(--primary-color);
            color: white;
            transform: rotate(180deg);
        }

        .timeline-item.active .timeline-content {
            max-height: 3000px;
            padding: 20px 30px 30px 30px;
            opacity: 1;
            transform: translateY(0);
            /* 내용 영역도 테마색 테두리 적용 */
            border-color: var(--primary-color);
            box-shadow: 0 15px 25px -10px rgba(99, 102, 241, 0.12);
        }

        .final-btn-wrapper {
            text-align: center;
            margin: 10px 0;
            padding: 40px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 16px;
            border: 1px dashed #CBD5E1;
        }

        .final-btn {
            display: inline-block;
            background: linear-gradient(135deg, var(--primary-color), #8B5CF6);
            color: white;
            text-decoration: none;
            padding: 18px 45px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 18px;
            transition: all 0.3s;
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.4);
        }

        .final-btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 20px 25px -5px rgba(99, 102, 241, 0.5);
        }

        @media (max-width: 768px) {
            header { padding: 40px 15px 20px 15px; }
            header h1 { font-size: 24px; }
            .timeline { padding: 0 15px; margin-bottom: 60px; }
            .timeline-marker { width: 36px; height: 36px; top: 15px; left: 0; font-size: 15px;}
            .timeline-item::before { left: 17px; top: 51px; bottom: -30px; }
            .timeline-header { margin-left: 52px; padding: 18px 20px; border-radius: 12px; }
            .timeline-header h2 { font-size: 16px; }
            .step-icon { width: 32px; height: 32px; font-size: 18px; }
            .timeline-content { margin-left: 52px; padding: 0 20px; }
            .timeline-item.active .timeline-content { padding: 15px 20px 25px 20px; }
            .pdf-frame { height: 500px; min-height: auto; }
        }
    </style>
</head>
<body>

    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>
    <div class="bg-blob blob-3"></div>

    <header>
        <div class="header-badge">AIEP Setup Guide</div>
        <h1>한눈에 보는 AIEP 설정 가이드</h1>
        <p>각 단계를 클릭하여 학교 내 플랫폼 도입과 세팅을 완벽하게 끝내보세요.</p>
    </header>

    <div class="timeline" id="timeline-container">
        </div>

    <script>
        const stepsData = [
            {
                emoji: "🏫",
                title: "1. 학교관리자 지정",
                desc: "학교 내에서 AIEP 플랫폼 도입과 전반적인 운영을 총괄할 '학교관리자(담당자)'를 지정합니다.",
                pdfUrl: null
            },
            {
                emoji: "📋",
                title: "2. 학운위 심의 여부 확인",
                desc: "플랫폼 도입 및 학생 개인정보 활용 등과 관련하여 학교운영위원회(학운위) 심의가 필요한지 사전에 확인하고, 학교 자체 규정에 따라 관련 절차를 진행합니다.",
                pdfUrl: null
            },
            {
                emoji: "👋",
                title: "3. 교사 회원가입 및 로그인, 학교변경",
                desc: "교사는 [edutech.gbe.kr(경북AI배움터) 플랫폼에 접속 후,] 우측 상단 회원가입 버튼을 클릭하여 회원가입을 할 수 있습니다. 아이디는 업무포털과 동일한 아이디를 사용합니다. 회원가입 후 학교관리자가 소속 교사 확인 및 승인 후 플랫폼 사용이 가능합니다.",
                pdfUrl: "https://drive.google.com/file/d/1ZXh1z6mei0fNjNnFiM84-JyeOo0MCLj-/preview"
            },
            {
                emoji: "⚙️",
                title: "4. 학교관리자 계정 확인 및 세팅",
                desc: "관리자 계정의 초기 비밀번호는 'password!!' 입니다. 관리자는 학교 세팅 마법사를 통해 NEIS 연계 파일인 교사별 담당교과 배정표, 수업시간 조회, 학기 학사일정을 업로드하여 시스템을 구성합니다. 이후 가입된 교사를 확인하여 승인하고, 각 학급의 담임을 배정합니다.",
                pdfUrl: "https://drive.google.com/file/d/1W87k7rKowyr5L9TQOSCkvx4EkQBHXjR7/preview"
            },
            {
                emoji: "🎨",
                title: "5. 교사 세팅",
                desc: "학교 관리자의 승인이 완료된 교사는 로그인 후 메인 화면에서 [나의 화면 구성하기]를 통해 화면 구성, 단축키, 위젯, 테마 등을 자신에게 맞게 설정할 수 있고, 다양한 에듀테크 및 수업 운영 서비스를 이용할 수 있습니다.",
                pdfUrl: "https://drive.google.com/file/d/15rYrnNzAZX0om7Vn8hMEysiy9Gnbe8P4/preview"
            },
            {
                emoji: "🔑",
                title: "6. 학생 아이디 및 비번 안내 (관리자)",
                desc: "학생 회원은 학생이 직접 가입하지 않으며, 학교관리자가 계정을 생성, 관리합니다.",
                pdfUrl: "https://drive.google.com/file/d/17wYt14G8e4EbnF05SbJvnbjC9icX8eoH/preview"
            },
            {
                emoji: "🚀",
                title: "7. AIEP 이용 시작",
                desc: "🎉 <strong>모든 플랫폼 설정이 완벽하게 끝났습니다!</strong> <br>이제 아래 버튼을 눌러 안내받은 계정으로 경북 AI 배움터에 접속하고 다채로운 에듀테크 서비스를 마음껏 활용해 보세요.",
                pdfUrl: null,
                isFinal: true
            }
        ];

        const container = document.getElementById('timeline-container');

        stepsData.forEach((step, index) => {
            const stepNum = index + 1;
            const item = document.createElement('div');
            item.className = 'timeline-item';
            
            if(index === 0) item.classList.add('active');

            let contentHTML = `<div class="desc-text">${step.desc}</div>`;
            
            if (step.pdfUrl) {
                contentHTML += `<iframe src="${step.pdfUrl}" class="pdf-frame" allow="autoplay" loading="lazy"></iframe>`;
            }

            if (step.isFinal) {
                contentHTML += `
                    <div class="final-btn-wrapper">
                        <a href="https://edutech.gbe.kr" target="_blank" class="final-btn">경북 AI 배움터 접속하기 ➔</a>
                    </div>
                `;
            }

            item.innerHTML = `
                <div class="timeline-marker">${stepNum}</div>
                <div class="timeline-header" onclick="toggleAccordion(this)">
                    <div class="title-area">
                        <div class="step-icon">${step.emoji}</div>
                        <h2>${step.title}</h2>
                    </div>
                    <div class="toggle-icon">▼</div>
                </div>
                <div class="timeline-content">
                    ${contentHTML}
                </div>
            `;

            container.appendChild(item);
        });

        function toggleAccordion(element) {
            const currentItem = element.parentElement;
            const allItems = document.querySelectorAll('.timeline-item');
            
            if (currentItem.classList.contains('active')) {
                currentItem.classList.remove('active');
                return;
            }

            allItems.forEach(item => {
                item.classList.remove('active');
            });

            currentItem.classList.add('active');

            setTimeout(() => {
                const yOffset = -100;
                const y = currentItem.getBoundingClientRect().top + window.pageYOffset + yOffset;
                window.scrollTo({top: y, behavior: 'smooth'});
            }, 350);
        }
    </script>
</body>
</html>
